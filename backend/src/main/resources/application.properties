spring.application.name=ecommerce-backend

server.port=${PORT:8080}
spring.config.import=optional:file:./.env[.properties],optional:file:./.env.local[.properties]
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/plain,text/css,text/xml
server.compression.min-response-size=1024

# Keep DB_URL in JDBC format, for example: jdbc:postgresql://host:5432/database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=public

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:200MB}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.jwt.checkout-expiration-minutes=${CHECKOUT_TOKEN_EXPIRATION_MINUTES:30}
app.jwt.issuer=${JWT_ISSUER:ecommerce-backend}

app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.api-base-url=${RAZORPAY_API_BASE_URL:https://api.razorpay.com/v1}
app.razorpay.currency=${RAZORPAY_CURRENCY:INR}

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:ecommerce}

app.demo.enabled=${APP_DEMO_ENABLED:false}
app.demo.sample-image-url=${APP_DEMO_SAMPLE_IMAGE_URL:https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1200&q=80}
app.demo.sample-video-url=${APP_DEMO_SAMPLE_VIDEO_URL:http://localhost:5173/hero-gadget-video.mp4}

app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
app.admin.bootstrap.email=${ADMIN_EMAIL:}
app.admin.bootstrap.password=${ADMIN_PASSWORD:}
app.admin.bootstrap.reset-existing-password=${ADMIN_RESET_EXISTING_PASSWORD:false}

app.upload.max-file-size-mb=${UPLOAD_MAX_FILE_SIZE_MB:200}
