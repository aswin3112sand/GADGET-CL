spring.datasource.url=jdbc:h2:file:./.local/ecommerce-local;MODE=PostgreSQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=PUBLIC
spring.flyway.enabled=true
# Legacy local H2 files were created without Flyway history, so baseline them at V3
# and let the repair migration bring them up to the current schema safely.
spring.flyway.baseline-version=3

app.demo.enabled=true
app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
app.admin.bootstrap.email=${ADMIN_EMAIL:admin@example.com}
app.admin.bootstrap.password=${ADMIN_PASSWORD:change-this-password}
app.admin.bootstrap.reset-existing-password=${ADMIN_RESET_EXISTING_PASSWORD:false}

app.cloudinary.folder=ecommerce-demo
